name: Lucky-Six-Event-Aware-Updater

# 觸發條件設定
on:
  schedule:
    # 每天台灣時間 20:45 執行檢查 (對應 UTC 12:45)
    # 分 時 日 月 週
    - cron: '45 12 * * *'
  
  # 允許隨時從 GitHub 介面手動執行測試
  workflow_dispatch:

jobs:
  smart-update:
    runs-on: ubuntu-latest
    
    # 授予寫入權限，確保 data.json 能被更新回倉庫
    permissions:
      contents: write

    steps:
      - name: 1. 檢出原始碼 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 初始化 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必要組件 (如有需要)
        run: |
          python -m pip install --upgrade pip
          # 若您的 app.py 需要爬蟲或數據處理，請取消下方註解
          # pip install requests pandas beautifulsoup4

      - name: 4. 執行智慧調度引擎 (Execution)
        id: run_script
        run: |
          # 偵錯：確認檔案存在
          if [ ! -f "app.py" ]; then
            echo "錯誤：根目錄找不到 app.py"
            exit 1
          fi
          python app.py
        env:
          PYTHONUNBUFFERED: 1

      - name: 5. 自動偵測變動並推送到網頁 (Deploy)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Lucky-Six-Bot"
          
          git add data.json
          
          # 偵錯邏輯：只有當 data.json 真正被 app.py 修改時才提交
          if git diff --staged --quiet; then
            echo "今日非開獎日且無加碼活動，數據未變動，跳過更新。"
          else
            git commit -m "Lucky-Six 自動更新 [$(date '+%Y-%m-%d %H:%M:%S')]"
            git push
          fi
