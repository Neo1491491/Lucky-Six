name: LuckySixUpdate
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas numpy

      # 加入 ls -R 指令可以幫你檢查檔案到底在哪裡，方便除錯
      - name: Check File Structure
        run: ls -R

      - name: Run Engine
        run: python app.py  # 確保這裡是小寫，且 app.py 在根目錄
