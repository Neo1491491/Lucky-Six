name: LuckySix-2.0-Automation
on:
  schedule:
    - cron: '0 * * * *' # 每小時自動更新
  workflow_dispatch: # 支援手動觸發
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入權限，這非常重要
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4 # 升級至最新版 v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要組件
        run: pip install pandas numpy

      - name: 執行核心運算
        run: |
          # 檢查 app.py 是否存在於根目錄
          if [ ! -f "app.py" ]; then
            echo "錯誤：找不到 app.py，請確認檔案在根目錄而非資料夾中！"
            ls -R
            exit 1
          fi
          python app.py

      - name: 自動提交與推送
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "LuckySix-Bot"
          git add data.json
          git commit -m "Auto Update: $(date)" || echo "No changes to commit"
          git push
