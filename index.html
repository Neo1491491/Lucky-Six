<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY SIX 2.4 | 專業能量監控站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --danger: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #333; margin-bottom: 20px; position: relative; }
        .ball { display: inline-block; width: 45px; height: 45px; background: linear-gradient(135deg, var(--gold), #b8860b); color: black; border-radius: 50%; text-align: center; line-height: 45px; font-weight: 800; margin: 5px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(240, 185, 11, 0.3); }
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; background: rgba(78, 228, 78, 0.2); color: #4ee44e; border: 1px solid #4ee44e; }
        h1, h4 { color: var(--gold); margin-top: 0; }
        .info-text { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" style="text-align: center;">
            <div class="status-badge" id="trendBadge">偵測中...</div>
            <h1>🎰 LUCKY SIX 2.4 智動預測</h1>
            <div id="balls">數據加載中...</div>
            <p class="update-tag" id="lastUpdate" style="color:#888; font-size:0.8rem; margin-top:15px;"></p>
        </div>

        <div class="card">
            <h4>📊 系統分析標準</h4>
            <p class="info-text">
                能量漂移曲線以 <b>50分</b> 為基礎基準線。高於 50分 代表號碼進入「活躍區」，低於則處於「休眠期」。
                本期系統偵測到 <b>核心信心值為 <span id="confVal" style="color:var(--gold)">--</span>%</b>，
                主要權重分配：頻率 (40%) + 遺漏補償 (30%) + 尾數聯動 (30%)。
            </p>
        </div>

        <div class="grid">
            <div class="card">
                <h4>📈 能量漂移監控 (Confidence Drift)</h4>
                <canvas id="driftChart"></canvas>
            </div>
            <div class="card">
                <h4>💰 近 28 期命中趨勢 (Hit Ratio)</h4>
                <canvas id="hitChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                
                // 渲染號碼
                const bContainer = document.getElementById('balls');
                bContainer.innerHTML = '';
                data.recommendation.forEach(n => {
                    const b = document.createElement('div');
                    b.className = 'ball'; b.innerText = n < 10 ? '0'+n : n;
                    bContainer.appendChild(b);
                });

                document.getElementById('lastUpdate').innerText = "最後同步: " + data.last_update;
                document.getElementById('confVal').innerText = data.analysis_report.confidence;
                document.getElementById('trendBadge').innerText = "趨勢: " + data.analysis_report.trend;

                // 漂移圖表 (加入基準線)
                new Chart(document.getElementById('driftChart'), {
                    type: 'line',
                    data: {
                        labels: ['T-4', 'T-3', 'T-2', 'T-1', 'Now'],
                        datasets: [
                            { label: '推薦組能量', data: data.drift, borderColor: '#f0b90b', tension: 0.3, fill: false, borderWidth: 3 },
                            { label: '基準線(50)', data: [50, 50, 50, 50, 50], borderColor: '#ff4d4d', borderDash: [5, 5], pointRadius: 0, fill: false }
                        ]
                    },
                    options: { scales: { y: { min: 0, max: 100, ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } } }
                });

                // 命中趨勢
                new Chart(document.getElementById('hitChart'), {
                    type: 'bar',
                    data: {
                        labels: Array.from({length: 28}, (_, i) => i + 1),
                        datasets: [{ label: '命中數', data: data.hit_trend, backgroundColor: '#4ee44e' }]
                    },
                    options: { scales: { y: { max: 6, ticks: { stepSize: 1, color: '#aaa' } } } }
                });

            } catch (e) { console.error("Data error", e); }
        }
        updateDashboard();
    </script>
</body>
</html>
