<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY SIX 3.0 | 交互式數據戰情室</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --danger: #ff4d4d; --success: #4ee44e; --blue: #3498db; --purple: #a55eea; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        h1, h4 { color: var(--gold); margin: 0; }
        
        .ball-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 10px; min-height: 40px; }
        .ball { width: 34px; height: 34px; border-radius: 50%; text-align: center; line-height: 34px; font-weight: 800; font-size: 0.85rem; }
        .ball-predict { background: linear-gradient(135deg, var(--gold), #b8860b); color: black; }
        .ball-history { background: linear-gradient(135deg, var(--blue), #2980b9); color: white; }
        .ball-special { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; border: 2px solid white; }
        
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-box { height: 240px; cursor: crosshair; }
        .info-label { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        .highlight-text { color: var(--gold); font-size: 1.1rem; font-weight: bold; }
        
        .click-hint { font-size: 0.75rem; color: var(--success); margin-top: 5px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" style="text-align: center; border-bottom: 3px solid var(--gold);">
            <h1>🎰 LUCKY SIX 3.0 交互戰情室</h1>
            <div class="info-label" style="margin-top:10px;">下一期核心推薦 (Next Prediction)</div>
            <div id="nextBalls" class="ball-row"></div>
            <div class="click-hint">💡 提示：點擊下方圖表上的任一點，可追溯該期歷史對獎紀錄</div>
        </div>

        <div class="chart-grid">
            <div class="card">
                <h4>📋 歷史獎號追蹤 (Click to View)</h4>
                <div style="text-align: center; margin: 15px 0; min-height: 100px;">
                    <div id="issueText" class="highlight-text">請點擊圖表點位</div>
                    <div id="actualBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="historyChart"></canvas></div>
            </div>

            <div class="card">
                <h4>🎯 同期預測表現 (Performance)</h4>
                <div style="text-align: center; margin: 15px 0; min-height: 100px;">
                    <div class="info-label">當時系統預測號碼</div>
                    <div id="predictBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="hitChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let fullHistory = [];
        let charts = {};

        async function init() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();
                fullHistory = data.history;

                // 渲染下一期預測
                renderBalls('nextBalls', data.next_prediction, 'ball-predict');
                
                // 預設顯示最新一期的歷史紀錄
                updateInteractionView(27); 

                // 初始化圖表
                renderCharts(data);
            } catch (e) { console.error(e); }
        }

        function updateInteractionView(index) {
            const record = fullHistory[index];
            if(!record) return;

            // 更新文字資訊
            document.getElementById('issueText').innerText = `${record.date} 第 ${record.issue} 期`;

            // 更新左側：獎號 + 特別號
            const actualContainer = document.getElementById('actualBalls');
            actualContainer.innerHTML = '';
            record.actual.forEach(n => {
                actualContainer.innerHTML += `<div class="ball ball-history">${n<10?'0'+n:n}</div>`;
            });
            actualContainer.innerHTML += `<div style="color:#666; font-weight:bold; margin:0 5px; line-height:34px;">+</div>`;
            actualContainer.innerHTML += `<div class="ball ball-special">${record.special<10?'0'+record.special:record.special}</div>`;

            // 更新右側：預測號碼
            renderBalls('predictBalls', record.predict, 'ball-predict');
        }

        function renderBalls(id, nums, cls) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            nums.forEach(n => {
                const b = document.createElement('div');
                b.className = `ball ${cls}`;
                b.innerText = n < 10 ? '0'+n : n;
                el.appendChild(b);
            });
        }

        function renderCharts(data) {
            const labels = data.history.map(h => h.issue.slice(-3));
            const hitData = data.history.map(h => h.hit_count);
            
            // 通用點擊邏輯
            const onClickEvent = (event, elements) => {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    updateInteractionView(index);
                }
            };

            // 左圖：歷史趨勢
            const ctxH = document.getElementById('historyChart').getContext('2d');
            charts.h = new Chart(ctxH, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '能量軌跡',
                        data: data.history.map(h => h.actual.reduce((a,b)=>a+b,0)/6),
                        borderColor: '#3498db',
                        pointBackgroundColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        fill: false
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    onClick: onClickEvent,
                    scales: { y: { display: false }, x: { grid: { color: '#333' } } },
                    plugins: { legend: { display: false } }
                }
            });

            // 右圖：命中柱狀
            const ctxHit = document.getElementById('hitChart').getContext('2d');
            charts.hit = new Chart(ctxHit, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '命中數',
                        data: hitData,
                        backgroundColor: hitData.map(v => v >= 3 ? '#4ee44e' : 'rgba(255,255,255,0.1)'),
                        borderRadius: 4
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    onClick: onClickEvent,
                    scales: { y: { max: 6, ticks: { stepSize: 1 } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
