<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY SIX 2.9 | 數據對稱監控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --danger: #ff4d4d; --success: #4ee44e; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        h1, h4 { color: var(--gold); margin: 0 0 15px 0; }
        
        /* 號碼球樣式基礎 */
        .ball-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 45px; }
        .ball { display: inline-block; width: 38px; height: 38px; border-radius: 50%; text-align: center; line-height: 38px; font-weight: 800; font-size: 0.95rem; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        
        /* 預測球 (金色) */
        .ball-predict { background: linear-gradient(135deg, var(--gold), #b8860b); color: black; }
        /* 歷史球 (藍色) */
        .ball-history { background: linear-gradient(135deg, var(--blue), #2980b9); color: white; }
        
        /* 直播視窗 */
        .live-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; border: 1px solid var(--danger); }
        .live-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 網格佈局 */
        .main-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 15px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .update-tag { color: var(--gold); font-family: monospace; font-size: 0.9rem; margin-top: 10px; }
        .chart-box { height: 260px; position: relative; }
        .info-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        @media (max-width: 768px) {
            .main-grid, .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="main-grid">
            <div class="card" style="text-align: center;">
                <h1>🎰 LUCKY SIX 2.9 數據對稱系統</h1>
                <div class="info-label">下一期核心推薦 (Next Prediction)</div>
                <div id="mainBalls" class="ball-row">數據分析中...</div>
                <div class="update-tag">系統時間：<span id="liveClock">0000-00-00 00:00:00</span></div>
                <p id="trendBadge" style="margin-top:10px; color:var(--success); font-size:0.85rem; font-weight: bold;">--</p>
            </div>
            
            <div class="card">
                <h4>🔴 開獎直播連線</h4>
                <div class="live-container">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC8V0t1E8Fj9XoX6xW3vY7Zg" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card">
                <h4>📋 歷史獎號監控 (History)</h4>
                <div style="text-align: center; margin-bottom: 15px;">
                    <div class="info-label">上一期實際獎號 (Actual Numbers)</div>
                    <div id="historyBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="historyChart"></canvas></div>
            </div>

            <div class="card">
                <h4>🎯 預測效能對比 (Performance)</h4>
                <div style="text-align: center; margin-bottom: 15px;">
                    <div class="info-label">對應期預測號碼 (Predicted)</div>
                    <div id="predictCompareBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="hitChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h4>📈 能量漂移監控 (Confidence Drift)</h4>
            <div class="chart-box" style="height: 180px;"><canvas id="driftChart"></canvas></div>
        </div>
    </div>

    <script>
        let charts = {};

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                document.getElementById('liveClock').innerText = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            }, 1000);
        }

        async function initDashboard() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();

                // 1. 渲染頂部大球 (預測)
                renderBalls('mainBalls', data.recommendation, 'ball-predict');

                // 2. 渲染左側歷史球 (藍色) - 這裡模擬上一期真實號碼
                // 真實應用時，建議將這些數據放入 data.json 的 'last_actual' 欄位
                const mockActual = [07, 12, 24, 33, 41, 48]; 
                renderBalls('historyBalls', mockActual, 'ball-history');

                // 3. 渲染右側對比球 (金色) - 這裡顯示對應期的預測組合
                const mockPredicted = [05, 12, 23, 33, 40, 48];
                renderBalls('predictCompareBalls', mockPredicted, 'ball-predict');

                document.getElementById('trendBadge').innerText = "系統狀態: " + data.analysis_report.trend;

                // 4. 繪製圖表
                renderCharts(data);

            } catch (e) { console.error("Update Error", e); }
        }

        function renderBalls(elementId, numbers, className) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            numbers.forEach(n => {
                const b = document.createElement('div');
                b.className = `ball ${className}`;
                b.innerText = n < 10 ? '0' + parseInt(n) : n;
                container.appendChild(b);
            });
        }

        function renderCharts(data) {
            // 歷史獎號趨勢 (左)
            const ctxH = document.getElementById('historyChart').getContext('2d');
            if(charts.history) charts.history.destroy();
            charts.history = new Chart(ctxH, {
                type: 'line',
                data: {
                    labels: Array.from({length: 28}, (_, i) => i + 1),
                    datasets: [{
                        label: '獎號趨勢',
                        data: data.hit_trend.map(v => 15 + (v*6) + Math.random()*12),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { display: false } } }
            });

            // 預測命中統計 (右)
            const ctxHit = document.getElementById('hitChart').getContext('2d');
            if(charts.hit) charts.hit.destroy();
            charts.hit = new Chart(ctxHit, {
                type: 'bar',
                data: {
                    labels: Array.from({length: 28}, (_, i) => i + 1),
                    datasets: [{
                        label: '命中數',
                        data: data.hit_trend,
                        backgroundColor: (c) => c.raw >= 3 ? '#4ee44e' : 'rgba(255,255,255,0.2)',
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { max: 6, grid: { color: '#333' } }, x: { display: false } } }
            });

            // 能量漂移 (底)
            const ctxD = document.getElementById('driftChart').getContext('2d');
            if(charts.drift) charts.drift.destroy();
            charts.drift = new Chart(ctxD, {
                type: 'line',
                data: {
                    labels: ['T-4', 'T-3', 'T-2', 'T-1', 'Now'],
                    datasets: [
                        { label: '信心動能', data: data.drift, borderColor: '#f0b90b', tension: 0.4, fill: false },
                        { label: '基準(50)', data: [50, 50, 50, 50, 50], borderColor: '#ff4d4d', borderDash: [5, 5], pointRadius: 0 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { min: 0, max: 100, grid: { color: '#333' } } } }
            });
        }

        window.onload = () => { startClock(); initDashboard(); };
    </script>
</body>
</html>
