<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY SIX 2.9.1 | 數據實時對稱版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --danger: #ff4d4d; --success: #4ee44e; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        h1, h4 { color: var(--gold); margin: 0; }
        .ball-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; min-height: 45px; margin-top: 10px; }
        .ball { width: 38px; height: 38px; border-radius: 50%; text-align: center; line-height: 38px; font-weight: 800; font-size: 0.95rem; }
        .ball-predict { background: linear-gradient(135deg, var(--gold), #b8860b); color: black; }
        .ball-history { background: linear-gradient(135deg, var(--blue), #2980b9); color: white; }
        .live-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; border: 1px solid var(--danger); margin-top: 15px; }
        .live-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .main-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 15px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .chart-box { height: 260px; position: relative; }
        .info-label { font-size: 0.8rem; color: #888; font-weight: bold; margin-bottom: 5px; }
        .update-tag { color: var(--gold); font-family: monospace; font-size: 0.9rem; margin-top: 10px; }
        @media (max-width: 768px) { .main-grid, .chart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-grid">
            <div class="card" style="text-align: center;">
                <h1>🎰 LUCKY SIX 2.9.1 實時系統</h1>
                <div class="info-label" style="margin-top:15px;">下一期核心推薦 (Next Prediction)</div>
                <div id="mainBalls" class="ball-row">數據加載中...</div>
                <div class="update-tag">系統時間：<span id="liveClock">00:00:00</span></div>
                <p id="trendBadge" style="color:var(--success); font-weight:bold; margin-top:10px;">--</p>
            </div>
            <div class="card">
                <h4>🔴 開獎直播連線</h4>
                <div class="live-container">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC8V0t1E8Fj9XoX6xW3vY7Zg" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card">
                <h4>📋 歷史獎號 (History)</h4>
                <div style="text-align: center; margin: 15px 0;">
                    <div class="info-label">第 <span id="issueActual">--</span> 期 實際獎號</div>
                    <div id="historyBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="historyChart"></canvas></div>
            </div>
            <div class="card">
                <h4>🎯 預測效能 (Performance)</h4>
                <div style="text-align: center; margin: 15px 0;">
                    <div class="info-label">第 <span id="issuePredict">--</span> 期 系統預測</div>
                    <div id="predictCompareBalls" class="ball-row"></div>
                </div>
                <div class="chart-box"><canvas id="hitChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h4>📈 能量漂移監控 (Confidence Drift)</h4>
            <div class="chart-box" style="height: 180px;"><canvas id="driftChart"></canvas></div>
        </div>
    </div>

    <script>
        let charts = {};
        function startClock() {
            setInterval(() => {
                const now = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                document.getElementById('liveClock').innerText = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            }, 1000);
        }

        async function initDashboard() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();

                // 動態更新期數文字
                document.getElementById('issueActual').innerText = data.current_issue || "--";
                document.getElementById('issuePredict').innerText = data.current_issue || "--";

                // 渲染各組號碼球
                renderBalls('mainBalls', data.recommendation, 'ball-predict');
                renderBalls('historyBalls', data.last_actual, 'ball-history');
                renderBalls('predictCompareBalls', data.last_predicted, 'ball-predict');

                document.getElementById('trendBadge').innerText = "系統狀態: " + data.analysis_report.trend;
                renderCharts(data);
            } catch (e) { console.error("Update Error", e); }
        }

        function renderBalls(id, nums, cls) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            if(!nums) return;
            nums.forEach(n => {
                const b = document.createElement('div');
                b.className = `ball ${cls}`;
                b.innerText = n < 10 ? '0'+parseInt(n) : n;
                el.appendChild(b);
            });
        }

        function renderCharts(data) {
            const commonOpt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { display: false } } };
            
            const ctxH = document.getElementById('historyChart').getContext('2d');
            if(charts.h) charts.h.destroy();
            charts.h = new Chart(ctxH, { type: 'line', data: { labels: Array.from({length: 28}, (_, i) => i), datasets: [{ data: data.hit_trend.map(v => 20+v*5+Math.random()*10), borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', fill: true, tension: 0.4 }] }, options: commonOpt });

            const ctxHit = document.getElementById('hitChart').getContext('2d');
            if(charts.hit) charts.hit.destroy();
            charts.hit = new Chart(ctxHit, { type: 'bar', data: { labels: Array.from({length: 28}, (_, i) => i), datasets: [{ data: data.hit_trend, backgroundColor: (c) => c.raw >= 3 ? '#4ee44e' : 'rgba(255,255,255,0.2)', borderRadius: 4 }] }, options: { ...commonOpt, scales: { y: { max: 6, grid: { color: '#333' } }, x: { display: false } } } });

            const ctxD = document.getElementById('driftChart').getContext('2d');
            if(charts.d) charts.d.destroy();
            charts.d = new Chart(ctxD, { type: 'line', data: { labels: [1,2,3,4,5], datasets: [{ label: '信心值', data: data.drift, borderColor: '#f0b90b', tension: 0.4 }, { label: '基準', data: [50,50,50,50,50], borderColor: '#ff4d4d', borderDash: [5,5], pointRadius: 0 }] }, options: { ...commonOpt, plugins: { legend: { display: true, labels: { color: '#fff' } } }, scales: { y: { min: 0, max: 100, grid: { color: '#333' } }, x: { display: true } } } });
        }

        window.onload = () => { startClock(); initDashboard(); };
    </script>
</body>
</html>
