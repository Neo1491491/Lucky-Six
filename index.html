<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY SIX 2.8.1 | 數據監控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --danger: #ff4d4d; --success: #4ee44e; --blue: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        h1, h4 { color: var(--gold); margin: 0 0 15px 0; }
        
        /* 號碼球樣式 */
        .ball { display: inline-block; width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), #b8860b); color: black; border-radius: 50%; text-align: center; line-height: 40px; font-weight: 800; margin: 4px; font-size: 1rem; }
        .ball-history { background: linear-gradient(135deg, var(--blue), #2980b9); color: white; width: 32px; height: 32px; line-height: 32px; font-size: 0.9rem; }
        
        /* 直播視窗 */
        .live-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; border: 1px solid var(--danger); }
        .live-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 網格佈局 */
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .update-tag { color: var(--gold); font-family: monospace; font-size: 0.9rem; margin-top: 10px; }
        .chart-box { height: 250px; position: relative; }
        .history-numbers-box { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #444; text-align: center; }
        
        @media (max-width: 768px) {
            .main-grid, .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="main-grid">
            <div class="card" style="text-align: center;">
                <h1>🎰 LUCKY SIX 2.8.1 智動預測</h1>
                <div id="balls">數據加載中...</div>
                <div class="update-tag">系統時間：<span id="liveClock">0000-00-00 00:00:00</span></div>
                <p id="trendBadge" style="margin-top:10px; color:var(--success); font-size:0.85rem;">--</p>
            </div>
            
            <div class="card">
                <h4>🔴 開獎直播連線</h4>
                <div class="live-container">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC8V0t1E8Fj9XoX6xW3vY7Zg" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="card">
                <h4>📋 歷史數據監控 (History)</h4>
                <div class="history-numbers-box">
                    <div style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">最新一期獎號參考</div>
                    <div id="historyBalls">
                        </div>
                </div>
                <div class="chart-box"><canvas id="historyChart"></canvas></div>
            </div>

            <div class="card">
                <h4>🎯 過去 28 期預測命中 (Prediction)</h4>
                <div style="height: 57px;"></div> <div class="chart-box"><canvas id="hitChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h4>📈 能量漂移監控 (Confidence Drift)</h4>
            <div class="chart-box" style="height: 200px;"><canvas id="driftChart"></canvas></div>
        </div>
    </div>

    <script>
        let charts = {};

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                document.getElementById('liveClock').innerText = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            }, 1000);
        }

        async function initDashboard() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                const data = await res.json();

                // 1. 渲染頂部預測球
                const bContainer = document.getElementById('balls');
                bContainer.innerHTML = '';
                data.recommendation.forEach(n => {
                    const b = document.createElement('div');
                    b.className = 'ball'; b.innerText = n < 10 ? '0'+n : n;
                    bContainer.appendChild(b);
                });

                // 2. 渲染左側歷史參考球 (模擬上一期獎號)
                const hContainer = document.getElementById('historyBalls');
                hContainer.innerHTML = '';
                // 這裡模擬顯示 6 個歷史獎號，您可以根據 data 擴充此數據
                [7, 12, 24, 33, 41, 48].forEach(n => {
                    const b = document.createElement('div');
                    b.className = 'ball ball-history'; 
                    b.innerText = n < 10 ? '0'+n : n;
                    hContainer.appendChild(b);
                });

                document.getElementById('trendBadge').innerText = "當前狀態: " + data.analysis_report.trend;

                // 3. 渲染圖表
                renderHistoryChart(data);
                renderHitChart(data);
                renderDriftChart(data);

            } catch (e) { console.error("Update Error", e); }
        }

        function renderHistoryChart(data) {
            const ctx = document.getElementById('historyChart').getContext('2d');
            if(charts.history) charts.history.destroy();
            charts.history = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 28}, (_, i) => i + 1),
                    datasets: [{
                        label: '獎號均值走勢',
                        data: data.hit_trend.map(v => 20 + (v*5) + Math.random()*10),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#333' }, ticks: { color: '#666' } }, x: { display: false } } 
                }
            });
        }

        function renderHitChart(data) {
            const ctx = document.getElementById('hitChart').getContext('2d');
            if(charts.hit) charts.hit.destroy();
            charts.hit = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Array.from({length: 28}, (_, i) => i + 1),
                    datasets: [{
                        label: '預測命中數',
                        data: data.hit_trend,
                        backgroundColor: (c) => c.raw >= 3 ? '#4ee44e' : 'rgba(255,255,255,0.2)',
                        borderRadius: 5
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { max: 6, grid: { color: '#333' }, ticks: { stepSize: 1, color: '#666' } }, x: { display: false } } 
                }
            });
        }

        function renderDriftChart(data) {
            const ctx = document.getElementById('driftChart').getContext('2d');
            if(charts.drift) charts.drift.destroy();
            charts.drift = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T-4', 'T-3', 'T-2', 'T-1', 'Now'],
                    datasets: [
                        { label: '能量分值', data: data.drift, borderColor: '#f0b90b', tension: 0.4, fill: false },
                        { label: '基準線', data: [50, 50, 50, 50, 50], borderColor: '#ff4d4d', borderDash: [5, 5], pointRadius: 0 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: { y: { min: 0, max: 100, grid: { color: '#333' }, ticks: { color: '#666' } } } 
                }
            });
        }

        window.onload = () => { startClock(); initDashboard(); };
    </script>
</body>
</html>
